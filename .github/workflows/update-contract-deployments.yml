name: Update Contract Deployments
on:
  schedule:
    - cron: '0 0 * * *'  # daily at midnight UTC
  workflow_dispatch:  # manual trigger

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ github.token }}

      - name: Fetch Dune query results
        run: |
          # Save response to file (avoids shell truncation of large JSON)
          curl -s \
            "https://api.dune.com/api/v1/query/6883877/results" \
            -H "X-Dune-Api-Key: ${{ secrets.DUNE_API_KEY }}" \
            -o raw_results.json

          # Debug: print top-level structure
          python3 -c "
          import json
          with open('raw_results.json') as f:
            data = json.load(f)
          print('top-level keys:', list(data.keys()))
          print('state:', data.get('state'))
          result = data.get('result') or {}
          print('result keys:', list(result.keys()))
          rows = result.get('rows', [])
          print('rows found:', len(rows))
          if rows:
            print('first row keys:', list(rows[0].keys()))
            print('first row:', rows[0])
          else:
            print('raw preview:', str(data)[:300])
          "

          # Write contract-deployments.json
          python3 -c "
          import json
          from datetime import datetime, timezone
          with open('raw_results.json') as f:
            data = json.load(f)
          rows = (data.get('result') or {}).get('rows', [])
          output = {
            'updated_at': datetime.now(timezone.utc).isoformat().replace('+00:00', 'Z'),
            'total_contracts': len(rows),
            'query_id': 6883877,
            'data': rows
          }
          with open('contract-deployments.json', 'w') as f:
            json.dump(output, f)
          print(f'Wrote {len(rows)} contract deployments')
          "

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add contract-deployments.json
          git diff --cached --quiet || (git commit -m "Update contract deployments data $(date -u +%Y-%m-%dT%H:%M:%SZ)" && git push)
